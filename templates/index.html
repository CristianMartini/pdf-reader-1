<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Engine — Evolux Academy</title>
<style>
  :root {
    --navy:  #011641;
    --gold:  #e2a331;
    --yellow:#f9d549;
    --bg:    #f4f6fb;
    --card:  #ffffff;
    --text:  #1a2340;
    --muted: #6b7a99;
    --border:#dde3f0;
    --green: #22c55e;
    --red:   #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  header .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .brand span {
    color: var(--gold);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ── LAYOUT ── */
  .container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: 0 2px 16px rgba(1,22,65,0.07);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .card h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: space-between;
  }
  
  .full-width { grid-column: 1 / -1; }

  /* ── EDITOR ── */
  .editor-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .editor-toolbar {
    display: flex;
    gap: 8px;
    background: #f8fafc;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  textarea#mdEditor {
    width: 100%;
    min-height: 400px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: "Courier New", monospace;
    font-size: 14px;
    resize: vertical;
  }
  .editor-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  /* ── BOTÕES ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
  }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: #02245e; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: #d09428; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: white; }

  /* ── LISTAS ── */
  .file-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
  #pdfList {gap: 12px; max-height: none;}
  .pdf-item{background:linear-gradient(135deg,#f9fbff,#eef3ff); border-left:4px solid var(--gold);}
  .file-item, .pdf-item, .img-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fafbff;
    transition: border-color .15s;
  }
  .file-item:hover, .pdf-item:hover, .img-item:hover { border-color: var(--gold); }
  .file-item .name, .pdf-item .name, .img-item .name {
    flex: 1; font-size: 0.875rem; font-weight: 500; word-break: break-all;
  }
  
  /* ── INPUTS & EXTRAS ── */
  .form-group {
    margin-bottom: 15px;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--navy);
  }
  .form-control {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
  }

  /* ── LOG ── */
  .log-box {
    background: var(--navy);
    border-radius: 10px;
    padding: 1rem;
    font-family: "Courier New", monospace;
    font-size: 0.8rem;
    color: #afc6ff;
    max-height: 240px;
    overflow-y: auto;
    white-space: pre-wrap;
    display: none;
  }
  .log-box.visible { display: block; }
  .log-box .ok  { color: var(--green); }
  .log-box .err { color: var(--red); }
  
  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--navy);
    color: #fff;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    transform: translateY(100px);
    opacity: 0;
    transition: all .3s;
    z-index: 999;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-left: 4px solid var(--green); }
  #toast.error   { border-left: 4px solid var(--red); }

  .flex-between { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span>⚡ PDF Engine • Padrão ABNT</span>
  </div>
</header>

<div class="container">

  <!-- ══ ARQUIVOS MD E EXTRAS ══ -->
  <div class="card">
    <h2><span class="ico">📂</span> Arquivos & Imagens</h2>
    
    <div style="margin-bottom: 1rem;">
      <div class="flex-between" style="margin-bottom: 8px;">
        <h3 style="font-size:0.9rem;">Documentos (.md)</h3>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('mdFileInput').click()">+ Novo / Upload MD</button>
        <input type="file" id="mdFileInput" accept=".md" style="display:none" onchange="uploadFile(this, 'md')">
      </div>
      <div class="file-list" id="mdList"></div>
    </div>

    <hr style="border:none; border-top:1px solid var(--border); margin: 15px 0;">

    <div style="margin-bottom: 1rem;">
      <div class="flex-between" style="margin-bottom: 8px;">
        <h3 style="font-size:0.9rem;">Imagens & Assets (Capa, Logo, Fotos)</h3>
        <button class="btn btn-gold btn-sm" onclick="document.getElementById('imgFileInput').click()">+ Upload Imagem</button>
        <input type="file" id="imgFileInput" accept="image/*,.svg" multiple style="display:none" onchange="uploadFile(this, 'img')">
      </div>
      <div class="file-list" id="imgList"></div>
      <p style="font-size:0.75rem; color:var(--muted); margin-top:5px;">Para usar uma imagem no texto, digite: <code>[IMG:nome.jpg]</code></p>
    </div>
    
    <hr style="border:none; border-top:1px solid var(--border); margin: 15px 0;">
    
    <div>
       <h3 style="font-size:0.9rem; margin-bottom: 8px;">Extras do PDF (Configuração da Aula)</h3>
       <div class="form-group">
         <label>Título da Aula (Capa)</label>
         <input type="text" id="metaTitle" class="form-control" placeholder="Ex: Anatomia Humana">
       </div>
       <div class="form-group">
         <label>Número da Aula</label>
         <input type="text" id="metaAula" class="form-control" placeholder="Ex: 03">
       </div>
    </div>
  </div>

  <!-- ══ EDITOR ══ -->
  <div class="card">
    <h2>
      <span><span class="ico">✍️</span> Editor Markdown</span>
      <span id="currentFileName" style="font-size:0.9rem; color:var(--muted); font-weight:normal;">Nenhum arquivo selecionado</span>
    </h2>
    
    <div class="editor-container">
      <div class="editor-toolbar">
        <button class="btn btn-ghost btn-sm" onclick="insertAtCursor('# ')">H1</button>
        <button class="btn btn-ghost btn-sm" onclick="insertAtCursor('## ')">H2</button>
        <button class="btn btn-ghost btn-sm" onclick="insertAtCursor('### ')">H3</button>
        <button class="btn btn-ghost btn-sm" onclick="insertAtCursor('- ')">Lista</button>
        <button class="btn btn-ghost btn-sm" onclick="insertBox()">Box</button>
        <button class="btn btn-ghost btn-sm" onclick="insertAtCursor('\\n[IMG:nome_da_imagem.jpg]\\n')">Imagem</button>
      </div>
      
      <textarea id="mdEditor" placeholder="Selecione um arquivo ou digite seu texto aqui..."></textarea>
      
      <div class="editor-actions">
        <button class="btn btn-primary" onclick="saveMarkdown()">💾 Salvar</button>
        <button class="btn btn-gold" onclick="generatePdfFromEditor()">▶ Gerar PDF deste arquivo</button>
        <button class="btn btn-danger" onclick="deleteCurrentFile()" id="btnDeleteCurrent" style="display:none; margin-left:auto;">🗑 Excluir</button>
      </div>
    </div>
    
    <div class="log-box" id="logBox" style="margin-top:1rem;"></div>
  </div>

  <!-- ══ PDFs GERADOS ══ -->
  <div class="card full-width">
    <h2><span class="ico">📑</span> PDFs Gerados</h2>
    <div class="file-list" id="pdfList" style="flex-direction:row; flex-wrap:wrap;"></div>
  </div>

</div>

<div id="toast"></div>

<script>
let currentFile = null;

async function loadLists() {
  const r = await fetch("/api/files");
  const d = await r.json();
  
  // MD List
  const mdList = document.getElementById("mdList");
  mdList.innerHTML = d.mds.map(f => `
    <div class="file-item" style="cursor:pointer;" onclick="loadFile('${f}')">
      <span class="name">📄 ${f}</span>
    </div>
  `).join("") || '<p class="muted">Nenhum documento</p>';

  // Img List
  const imgList = document.getElementById("imgList");
  imgList.innerHTML = d.imgs.map(f => `
    <div class="img-item">
      <span class="name" style="cursor:pointer;" onclick="insertAtCursor('\\n[IMG:${f}]\\n')" title="Clique para inserir no texto">🖼️ ${f}</span>
      <button class="btn btn-ghost btn-sm" onclick="deleteFile('img', '${f}')">🗑</button>
    </div>
  `).join("") || '<p class="muted">Nenhuma imagem enviada</p>';

  // PDF List
  const pdfList = document.getElementById("pdfList");
  pdfList.innerHTML = d.pdfs.map(f => `
    <div class="pdf-item" style="width: min(100%, 390px);">
      <span class="name">📑 ${f}</span>
      <a href="/outputs/${f}" target="_blank" class="btn btn-primary btn-sm">Abrir</a>
      <button class="btn btn-danger btn-sm" onclick="deleteFile('pdf', '${f}')">🗑</button>
    </div>
  `).join("") || '<p class="muted">Nenhum PDF gerado</p>';
}

async function uploadFile(input, type) {
  if (!input.files.length) return;
  const fd = new FormData();
  for(let i=0; i<input.files.length; i++){
    fd.append("files", input.files[i]);
  }
  
  const r = await fetch(`/api/upload/${type}`, { method:"POST", body: fd });
  const d = await r.json();
  if (d.ok) {
    toast(`✅ Arquivo(s) enviado(s)`, "success");
    loadLists();
    if(type === 'md' && input.files.length === 1) loadFile(input.files[0].name);
  } else {
    toast("❌ Erro: " + d.error, "error");
  }
  input.value = "";
}

async function loadFile(filename) {
  const r = await fetch(`/api/file/${filename}`);
  const d = await r.json();
  if(d.ok) {
    document.getElementById("mdEditor").value = d.content;
    document.getElementById("currentFileName").textContent = filename;
    currentFile = filename;
    document.getElementById("btnDeleteCurrent").style.display = "block";
    
    // Attempt to parse metadata
    const metaTitle = document.getElementById("metaTitle");
    const metaAula = document.getElementById("metaAula");
    metaTitle.value = d.meta?.title || "";
    metaAula.value = d.meta?.aula || "";
  }
}

async function saveMarkdown() {
  if(!currentFile) {
    const newName = prompt("Nome do novo arquivo (ex: aula04.md):");
    if(!newName) return;
    currentFile = newName.endsWith(".md") ? newName : newName + ".md";
    document.getElementById("currentFileName").textContent = currentFile;
    document.getElementById("btnDeleteCurrent").style.display = "block";
  }
  
  const content = document.getElementById("mdEditor").value;
  const title = document.getElementById("metaTitle").value;
  const aula = document.getElementById("metaAula").value;
  
  let finalContent = content;
  // Prepend meta if provided
  if(title || aula) {
    // Remove existing front-matter if any
    finalContent = finalContent.replace(/^---\n[\s\S]*?\n---\n/, '');
    finalContent = `---\ntitle: ${title || currentFile}\naula: ${aula || '01'}\n---\n\n` + finalContent;
    document.getElementById("mdEditor").value = finalContent; // update UI
  }
  
  const r = await fetch("/api/save", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({filename: currentFile, content: finalContent})
  });
  
  if(r.ok) {
    toast("💾 Salvo com sucesso", "success");
    loadLists();
  }
}

async function deleteCurrentFile() {
  if(!currentFile) return;
  if(confirm(`Excluir ${currentFile}?`)) {
    await deleteFile('md', currentFile);
    currentFile = null;
    document.getElementById("currentFileName").textContent = "Nenhum arquivo selecionado";
    document.getElementById("mdEditor").value = "";
    document.getElementById("btnDeleteCurrent").style.display = "none";
  }
}

async function deleteFile(type, filename) {
  const r = await fetch(`/api/delete/${type}/${encodeURIComponent(filename)}`, {method:"DELETE"});
  if (r.ok) { 
    toast(`🗑 Removido`, "success"); 
    loadLists(); 
  }
}

async function generatePdfFromEditor() {
  if(!currentFile) {
    toast("Salve o arquivo primeiro", "error");
    return;
  }
  await saveMarkdown();
  
  const logBox = document.getElementById("logBox");
  logBox.innerHTML = "<div class='info'>⏳ Gerando PDF...</div>";
  logBox.classList.add("visible");
  
  const r = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({files: [currentFile]})
  });
  const d = await r.json();
  
  if(d.ok && d.result && d.result.length > 0) {
    logBox.innerHTML += `<div class='ok'>✅ Gerado: ${d.result[0]}</div>`;
    loadLists();
    toast("✅ PDF Gerado!", "success");
  } else {
    logBox.innerHTML += `<div class='err'>❌ Erro: Falha ao gerar o PDF. Revise o log do terminal ou verifique se as imagens estão em formato suportado (use JPG/PNG em vez de HEIC).</div>`;
    toast("❌ Falha ao gerar", "error");
  }
}

function insertAtCursor(text) {
  const textarea = document.getElementById('mdEditor');
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
  textarea.selectionStart = textarea.selectionEnd = start + text.length;
  textarea.focus();
}

function insertBox() {
  const textarea = document.getElementById('mdEditor');
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selectedText = textarea.value.substring(start, end);
  
  let newText = "";
  if (selectedText.trim() === "") {
    newText = "\\n[BOX]\\nTexto importante aqui.\\n[/BOX]\\n";
  } else {
    newText = `\\n[BOX]\\n${selectedText}\\n[/BOX]\\n`;
  }
  
  textarea.value = textarea.value.substring(0, start) + newText + textarea.value.substring(end);
  textarea.selectionStart = textarea.selectionEnd = start + newText.length;
  textarea.focus();
}

function toast(msg, type="success") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => el.className = "", 3000);
}

loadLists();
</script>
</body>
</html>
